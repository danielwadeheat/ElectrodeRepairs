<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get an Instant Quote | Electrode Repairs – Newcastle, OK</title>
  <meta name="description" content="Get an instant repair quote from Electrode Repairs in Newcastle, OK. Tell us about your device and issue and we'll get back to you fast." />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="site-header-root"></div>

  <main id="main-content">

    <section class="page-hero" aria-labelledby="quote-heading">
      <div class="container">
        <h1 id="quote-heading">Get an Instant Quote</h1>
        <p>Fill out the form below and we'll get back to you quickly with a repair estimate. No obligation — just answers.</p>
      </div>
    </section>

    <section class="section" aria-labelledby="quote-form-heading">
      <div class="container">
        <div class="form-section">
          <h2 id="quote-form-heading" class="text-center" style="margin-bottom:1.5rem;">Tell Us About Your Device</h2>
          <form class="quote-form" novalidate aria-label="Instant quote request form">
            <div class="form-row">
              <div class="form-group">
                <label for="q-first-name">First Name <span aria-hidden="true">*</span></label>
                <input type="text" id="q-first-name" name="first_name" required autocomplete="given-name" placeholder="Jane" />
              </div>
              <div class="form-group">
                <label for="q-last-name">Last Name <span aria-hidden="true">*</span></label>
                <input type="text" id="q-last-name" name="last_name" required autocomplete="family-name" placeholder="Smith" />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="q-email">Email Address <span aria-hidden="true">*</span></label>
                <input type="email" id="q-email" name="email" required autocomplete="email" placeholder="jane@example.com" />
              </div>
              <div class="form-group">
                <label for="q-phone">Phone Number</label>
                <input type="tel" id="q-phone" name="phone" autocomplete="tel" placeholder="(405) 555-1234" />
              </div>
            </div>
            <div class="form-group">
              <label for="q-device">Device Type <span aria-hidden="true">*</span></label>
              <select id="q-device" name="device" required>
                <option value="">— Select a device —</option>
                <option value="iphone">iPhone</option>
                <option value="android">Android Phone</option>
                <option value="tablet">Tablet (iPad / Android)</option>
                <option value="computer">Computer / Laptop (Windows)</option>
                <option value="macbook">MacBook</option>
                <option value="game-console">Game Console</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="form-group">
              <label for="q-model">Device Make &amp; Model</label>
              <input type="text" id="q-model" name="device_model" placeholder="e.g. iPhone 13 Pro, Samsung Galaxy S22" />
            </div>
            <div class="form-group">
              <label for="q-issue">Describe the Issue <span aria-hidden="true">*</span></label>
              <textarea id="q-issue" name="issue" required placeholder="Tell us what's wrong with your device — the more detail, the better."></textarea>
            </div>
            <div class="form-group">
              <label for="q-how">How did you hear about us?</label>
              <select id="q-how" name="referral">
                <option value="">— Select one —</option>
                <option value="google">Google Search</option>
                <option value="social">Social Media</option>
                <option value="friend">Friend / Family Referral</option>
                <option value="driving">Drove By</option>
                <option value="other">Other</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">Submit Quote Request</button>
          </form>
        </div>

        <div style="text-align:center; margin-top:2.5rem; padding-top:2rem; border-top:1px solid #e2e8f0;">
          <h3>Prefer to call or stop by?</h3>
          <p style="margin:0.5rem 0;">We're happy to give you a quote in person or over the phone.</p>
          <p style="margin-top:0.75rem;">
            <a href="tel:+14052686305" class="btn btn-navy">📞 (405) 268-6305</a>
            &nbsp;
            <a href="location.html" class="btn btn-outline">📍 Find Our Store</a>
          </p>
        </div>
      </div>
    </section>

  </main>

  <div id="site-footer-root"></div>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
