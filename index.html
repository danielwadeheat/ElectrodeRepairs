<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0f172a" />

    <title>Electrode Repairs | Home</title>
    <meta
      name="description"
      content="Professional electrode repair services and support."
    />
    <meta
      name="keywords"
      content="electrode repairs, maintenance, industrial service"
    />
    <meta name="author" content="Electrode Repairs" />
    <meta name="robots" content="index, follow" />

    <link rel="canonical" href="https://example.com/" />
    <link rel="icon" href="/favicon.ico" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Electrode Repairs | Home" />
    <meta
      property="og:description"
      content="Professional electrode repair services and support."
    />
    <meta property="og:url" content="https://example.com/" />
    <meta property="og:image" content="https://example.com/og-image.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Electrode Repairs | Home" />
    <meta
      name="twitter:description"
      content="Professional electrode repair services and support."
    />
    <meta name="twitter:image" content="https://example.com/og-image.jpg" />

    <style>
      :root {
        --bg: #0b1220;
        --fg: #e5e7eb;
        --muted: #9ca3af;
        --card: #111827;
        --accent: #22c55e;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--fg);
        line-height: 1.5;
      }

      .container {
        max-width: 960px;
        margin: 0 auto;
        padding: 2rem 1rem;
      }

      header, footer {
        border-bottom: 1px solid #1f2937;
      }

      footer {
        border-top: 1px solid #1f2937;
        border-bottom: 0;
        color: var(--muted);
      }

      .hero {
        background: linear-gradient(180deg, #111827 0%, #0b1220 100%);
        border: 1px solid #1f2937;
        border-radius: 12px;
        padding: 2rem;
        margin-top: 1.5rem;
      }

      h1 { margin: 0 0 0.5rem; font-size: clamp(1.8rem, 3vw, 2.5rem); }
      p { margin: 0; color: var(--muted); }

      .cta {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.7rem 1rem;
        border-radius: 8px;
        background: var(--accent);
        color: #052e16;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>

  <body>
    <header>
      <div class="container">
        <strong>Electrode Repairs</strong>
      </div>
    </header>

    <main class="container">
      <section class="hero">
        <h1>Reliable Electrode Repair Services</h1>
        <p>Fast turnaround, consistent quality, and trusted technical support.</p>
        <a class="cta" href="#contact">Get Started</a>
      </section>
    </main>

    <footer id="contact">
      <div class="container">
        <small>&copy; 2026 Electrode Repairs. All rights reserved.</small>
      </div>
    </footer>
  </body>
</html>
